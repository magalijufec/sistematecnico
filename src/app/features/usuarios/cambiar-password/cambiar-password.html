<mat-card class="password-card">

  <mat-card-header>

    <mat-card-title>
      Cambiar contraseña
    </mat-card-title>

    <mat-card-subtitle>
      Actualizá la contraseña de tu cuenta
    </mat-card-subtitle>

  </mat-card-header>


  <mat-card-content>

    <form
      [formGroup]="form"
      (ngSubmit)="guardar()">


      <!-- Contraseña actual -->

      <mat-form-field
        appearance="outline"
        class="w-100">

        <mat-label>
          Contraseña actual
        </mat-label>

        <input
          matInput
          [type]="mostrarActual ? 'text' : 'password'"
          formControlName="passwordActual">

        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="mostrarActual = !mostrarActual">

          <mat-icon>

            {{ mostrarActual
              ? 'visibility_off'
              : 'visibility' }}

          </mat-icon>

        </button>

      </mat-form-field>


      <!-- Nueva contraseña -->

      <mat-form-field
        appearance="outline"
        class="w-100">

        <mat-label>
          Nueva contraseña
        </mat-label>

        <input
          matInput
          [type]="mostrarNueva ? 'text' : 'password'"
          formControlName="passwordNueva">

        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="mostrarNueva = !mostrarNueva">

          <mat-icon>

            {{ mostrarNueva
              ? 'visibility_off'
              : 'visibility' }}

          </mat-icon>

        </button>

      </mat-form-field>


      <!-- Confirmar -->

      <mat-form-field
        appearance="outline"
        class="w-100">

        <mat-label>
          Confirmar nueva contraseña
        </mat-label>

        <input
          matInput
          [type]="mostrarConfirmacion ? 'text' : 'password'"
          formControlName="confirmarPassword">

        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="mostrarConfirmacion = !mostrarConfirmacion">

          <mat-icon>

            {{ mostrarConfirmacion
              ? 'visibility_off'
              : 'visibility' }}

          </mat-icon>

        </button>

      </mat-form-field>


      @if (error) {

        <div class="error">
          {{ error }}
        </div>

      }


      @if (mensaje) {

        <div class="success">
          {{ mensaje }}
        </div>

      }


      <button
        mat-raised-button
        color="primary"
        type="submit">

        <mat-icon>
          lock_reset
        </mat-icon>

        Cambiar contraseña

      </button>

    </form>

  </mat-card-content>

</mat-card>
