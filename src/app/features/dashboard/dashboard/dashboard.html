<h1>Dashboard</h1>

<div class="cards">

    <div class="card pendiente">

        <h2>{{dashboard?.pendientes}}</h2>

        <span>Pendientes</span>

    </div>

    <div class="card proceso">

        <h2>{{dashboard?.enProceso}}</h2>

        <span>En proceso</span>

    </div>

    <div class="card pago">

        <h2>{{dashboard?.pendientePago}}</h2>

        <span>Pendiente Pago</span>

    </div>

    <div class="card finalizado">

        <h2>{{dashboard?.finalizados}}</h2>

        <span>Finalizados</span>

    </div>

</div>

<div class="cards">

    <div class="card total">

        <h2>{{dashboard?.totalTrabajos}}</h2>

        <span>Total Trabajos</span>

    </div>

    <div class="card total">

        <h2>{{dashboard?.totalClientes}}</h2>

        <span>Clientes</span>

    </div>

    <div class="card total">

        <h2>{{dashboard?.totalTecnicos}}</h2>

        <span>Técnicos</span>

    </div>

</div>
