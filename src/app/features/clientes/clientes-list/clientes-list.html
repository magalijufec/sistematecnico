<div class="clientes-container">

  <!-- Encabezado -->
  <div class="toolbar">

    <div>
      <h2>Clientes</h2>
      <p>Listado de farmacias y clientes registrados</p>
    </div>

    <button
      mat-raised-button
      color="primary">

      <mat-icon>add</mat-icon>

      Nuevo cliente

    </button>

  </div>

  <!-- Card -->
  <mat-card>

    <mat-card-header>

      <mat-card-title>
        Clientes
      </mat-card-title>

      <mat-card-subtitle>
        {{ clientes.length }} clientes registrados
      </mat-card-subtitle>

    </mat-card-header>

    <mat-divider></mat-divider>

    <mat-card-content>

      <!-- Vista escritorio -->
      <div class="table-container">

        <table
          mat-table
          [dataSource]="clientes"
          class="clientes-table">

          <!-- N° Cliente -->
          <ng-container matColumnDef="nroCliente">

            <th mat-header-cell *matHeaderCellDef>
              N°
            </th>

            <td mat-cell *matCellDef="let cliente">

              <strong>
                {{ cliente.nroCliente }}
              </strong>

            </td>

          </ng-container>


          <!-- Nombre -->
          <ng-container matColumnDef="nombre">

            <th mat-header-cell *matHeaderCellDef>
              Nombre
            </th>

            <td mat-cell *matCellDef="let cliente">

              <div class="cliente-nombre">

                <mat-icon>
                  local_pharmacy
                </mat-icon>

                <span>
                  {{ cliente.nombre }}
                </span>

              </div>

            </td>

          </ng-container>


          <!-- Ciudad -->
          <ng-container matColumnDef="ciudad">

            <th mat-header-cell *matHeaderCellDef>
              Ciudad
            </th>

            <td mat-cell *matCellDef="let cliente">

              <div class="ubicacion">

                <mat-icon>
                  location_city
                </mat-icon>

                {{ cliente.ciudad }}

              </div>

            </td>

          </ng-container>


          <!-- Provincia -->
          <ng-container matColumnDef="provincia">

            <th mat-header-cell *matHeaderCellDef>
              Provincia
            </th>

            <td mat-cell *matCellDef="let cliente">

              {{ cliente.provincia }}

            </td>

          </ng-container>


          <!-- Acciones -->
          <ng-container matColumnDef="acciones">

            <th mat-header-cell *matHeaderCellDef>
            </th>

            <td mat-cell *matCellDef="let cliente">

              <button
                mat-icon-button
                color="primary"
                matTooltip="Ver cliente">

                <mat-icon>
                  visibility
                </mat-icon>

              </button>

              <button
                mat-icon-button
                color="accent"
                matTooltip="Editar cliente">

                <mat-icon>
                  edit
                </mat-icon>

              </button>

            </td>

          </ng-container>


          <!-- Header -->
          <tr
            mat-header-row
            *matHeaderRowDef="displayedColumns">
          </tr>


          <!-- Filas -->
          <tr
            mat-row
            *matRowDef="
              let row;
              columns: displayedColumns;
            ">
          </tr>

        </table>

      </div>

    </mat-card-content>

  </mat-card>

</div>
