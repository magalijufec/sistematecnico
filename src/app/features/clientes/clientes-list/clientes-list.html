<h2>Clientes</h2>

<table>

    <thead>

        <tr>

            <th>N°</th>

            <th>Nombre</th>

            <th>Ciudad</th>

            <th>Provincia</th>

            <th>Empresa</th>

        </tr>

    </thead>

    <tbody>

        @for(cliente of clientes; track cliente.id){

        <tr>

            <td>{{cliente.nroCliente}}</td>

            <td>{{cliente.nombre}}</td>

            <td>{{cliente.ciudad}}</td>

            <td>{{cliente.provincia}}</td>

            <td>{{cliente.empresa}}</td>

        </tr>

        }

    </tbody>

</table>
