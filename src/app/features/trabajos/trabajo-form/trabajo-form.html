<mat-card>

    <mat-card-header>

        <mat-card-title>

            @if (!esEdicion) {

                Nueva Solicitud de Trabajo

            } @else {

                Editar Trabajo #{{ idTrabajo }}

            }

        </mat-card-title>

    </mat-card-header>


    <mat-card-content>

        <form
            [formGroup]="form"
            class="formulario">


            <!-- CLIENTE -->

            <mat-form-field appearance="outline">

                <mat-label>
                    Cliente
                </mat-label>

                <mat-select
                    formControlName="idCliente">

                    <mat-option>

                        <ngx-mat-select-search
                            [formControl]="clienteFiltro">

                        </ngx-mat-select-search>

                    </mat-option>


                    <mat-option
                        *ngFor="let cliente of clientesFiltrados"
                        [value]="cliente.id">

                        {{ cliente.nombre }}

                    </mat-option>

                </mat-select>

            </mat-form-field>


            <!-- TÉCNICO -->

            <mat-form-field appearance="outline">

                <mat-label>
                    Técnico
                </mat-label>

                <mat-select
                    formControlName="idTecnico">

                    <mat-option
                        *ngFor="let t of tecnicos"
                        [value]="t.id">

                        {{ t.nombre }}

                    </mat-option>

                </mat-select>

            </mat-form-field>


            <!-- TAREA -->

            <mat-form-field appearance="outline">

                <mat-label>
                    Tarea
                </mat-label>

                <mat-select
                    formControlName="idTarea">

                    <mat-option
                        *ngFor="let t of tareas"
                        [value]="t.id">

                        {{ t.nombre }}

                    </mat-option>

                </mat-select>

            </mat-form-field>


            <!-- COMENTARIOS -->

            <mat-form-field
                appearance="outline"
                class="comentarios">

                <mat-label>
                    Comentarios
                </mat-label>

                <textarea
                    matInput
                    rows="5"
                    formControlName="comentarios">
                </textarea>

            </mat-form-field>


            <!-- BOTONES -->

            <div class="botones">

                <button
                    mat-stroked-button
                    color="warn"
                    type="button">

                    Cancelar

                </button>


                <button
                    mat-raised-button
                    color="primary"
                    type="button"
                    (click)="guardar()">

                    @if (!esEdicion) {

                        Crear Trabajo

                    } @else {

                        Guardar Cambios

                    }

                </button>

            </div>


        </form>

    </mat-card-content>

</mat-card>
