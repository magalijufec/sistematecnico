<mat-card>

    <mat-card-header>

        <mat-card-title>
            Iniciar sesión
        </mat-card-title>

    </mat-card-header>

    <mat-card-content>

        <form
            [formGroup]="form"
            (ngSubmit)="login()">

            <mat-form-field
                appearance="outline"
                class="w-100">

                <mat-label>
                    Usuario
                </mat-label>

                <input
                    matInput
                    formControlName="userName">

            </mat-form-field>


            <mat-form-field
                appearance="outline"
                class="w-100">

                <mat-label>
                    Contraseña
                </mat-label>

                <input
                    matInput
                    type="password"
                    formControlName="password">

            </mat-form-field>


            @if(error) {

                <p class="error">
                    {{ error }}
                </p>

            }


            <button
                mat-raised-button
                color="primary"
                type="submit"
                [disabled]="form.invalid">

                Ingresar

            </button>

        </form>

    </mat-card-content>

</mat-card>
